apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: keycloakclients.keycloak.drewsonne.github.io
spec:
  group: keycloak.drewsonne.github.io
  scope: Namespaced
  names:
    plural: keycloakclients
    singular: keycloakclient
    kind: KeycloakClient
    shortNames:
      - kc
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: ClientId
          type: string
          jsonPath: .spec.clientId
        - name: Realm
          type: string
          jsonPath: .spec.realm
        - name: Ready
          type: boolean
          jsonPath: .status.create_fn.ready
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]
          properties:
            spec:
              type: object
              required: ["clientId", "realm", "redirectUris", "secretName"]
              properties:
                clientId:
                  type: string
                  maxLength: 255
                realm:
                  type: string
                  maxLength: 255
                redirectUris:
                  type: array
                  items:
                    type: string
                webOrigins:
                  type: array
                  items:
                    type: string
                secretName:
                  type: string
                  maxLength: 253
                secretNamespace:
                  type: string
                  description: "Namespace to write the K8s Secret to. Defaults to the CR's namespace."
                  maxLength: 63
                protocolMappers:
                  type: array
                  items:
                    type: object
                    required: ["name", "mapperType"]
                    properties:
                      name:
                        type: string
                      mapperType:
                        type: string
                      config:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                keycloakAdminSecret:
                  type: object
                  description: "Override the default Keycloak admin credentials."
                  required: ["name", "namespace"]
                  properties:
                    name:
                      type: string
                      maxLength: 253
                    namespace:
                      type: string
                      maxLength: 63
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
