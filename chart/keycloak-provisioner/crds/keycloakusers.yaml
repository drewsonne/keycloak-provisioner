apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: keycloakusers.keycloak.drewsonne.github.io
spec:
  group: keycloak.drewsonne.github.io
  scope: Namespaced
  names:
    plural: keycloakusers
    singular: keycloakuser
    kind: KeycloakUser
    shortNames:
      - ku
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Username
          type: string
          jsonPath: .spec.username
        - name: Realm
          type: string
          jsonPath: .spec.realm
        - name: Email
          type: string
          jsonPath: .spec.email
        - name: Enabled
          type: boolean
          jsonPath: .spec.enabled
        - name: Ready
          type: boolean
          jsonPath: .status.create_fn.ready
        - name: Drift
          type: boolean
          jsonPath: .status.check_drift.drift
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]
          properties:
            spec:
              type: object
              required: ["username", "realm"]
              properties:
                username:
                  type: string
                  description: "The Keycloak username. Immutable after creation."
                  maxLength: 255
                realm:
                  type: string
                  description: "The realm this user belongs to."
                  maxLength: 255
                email:
                  type: string
                  description: "The user's email address."
                  maxLength: 255
                firstName:
                  type: string
                  description: "The user's first name."
                  maxLength: 255
                lastName:
                  type: string
                  description: "The user's last name."
                  maxLength: 255
                enabled:
                  type: boolean
                  default: true
                  description: "Whether the user account is active."
                emailVerified:
                  type: boolean
                  default: false
                  description: "Mark the email address as already verified."
                attributes:
                  type: object
                  description: "Arbitrary key/value attributes to set on the user."
                  additionalProperties:
                    oneOf:
                      - type: string
                      - type: array
                        items:
                          type: string
                groups:
                  type: array
                  description: >
                    Names of KeycloakRealmGroups to add this user to. The controller
                    performs a full sync — groups listed here are added, groups not
                    listed are removed. The referenced groups must already exist.
                  items:
                    type: string
                realmRoles:
                  type: array
                  description: >
                    Realm-level roles to assign directly to this user. The controller
                    performs a full sync — roles listed here are added, roles not
                    listed are removed. The roles must already exist in the realm.
                  items:
                    type: string
                keycloakAdminSecret:
                  type: object
                  description: "Override the default Keycloak admin credentials from env."
                  required: ["name", "namespace"]
                  properties:
                    name:
                      type: string
                      maxLength: 253
                    namespace:
                      type: string
                      maxLength: 63
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
