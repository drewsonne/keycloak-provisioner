apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak-provisioner
  namespace: {{ .Values.namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: keycloak-provisioner
rules:
  - apiGroups: ["keycloak.drewsonne.github.io"]
    resources: ["keycloakclients", "keycloakclients/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: keycloak-provisioner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: keycloak-provisioner
subjects:
  - kind: ServiceAccount
    name: keycloak-provisioner
    namespace: {{ .Values.namespace }}
