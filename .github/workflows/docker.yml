env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: Build and Push Docker Image

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: drewsonne/keycloak-provisioner:${{ steps.meta.outputs.version }}-${{ matrix.arch }}

  merge:
    needs: [build]
    runs-on: ubuntu-latest

    permissions:
      actions: write

    steps:
      - name: Extract version from tag
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag drewsonne/keycloak-provisioner:latest \
            --tag drewsonne/keycloak-provisioner:${{ steps.meta.outputs.version }} \
            drewsonne/keycloak-provisioner:${{ steps.meta.outputs.version }}-amd64 \
            drewsonne/keycloak-provisioner:${{ steps.meta.outputs.version }}-arm64

      - name: Trigger Helm publish
        run: |
          gh workflow run helm.yml --repo "${{ github.repository }}" --ref "${{ github.ref }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
